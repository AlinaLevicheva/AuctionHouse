spring.application.name=AuctionHouse

# Подключение к PostgreSQL (ТВОЯ БД)
spring.datasource.url=jdbc:postgresql://localhost:5432/Auctiondom
spring.datasource.username=postgres
spring.datasource.password=7412369

# JPA (отключаем авто-создание таблиц)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway (включаем)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Base migration

# Liquibase (ОТКЛЮЧАЕМ)
spring.liquibase.enabled=false

# Логирование
logging.level.org.springframework.web=DEBUG
logging.level.com.auction.auctionhouse=DEBUG
logging.level.org.flywaydb=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,loggers

# Порт сервера
server.port=8080